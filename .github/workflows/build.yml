# CI + releases.
#
# Every push/PR builds Linux and Windows (including the Windows installer,
# uploaded as a workflow artifact). Releasing is just:
#
#   git tag v1.2.3 && git push --tags
#
# The tag must match project(VERSION) in CMakeLists.txt (checked below); the
# workflow then creates the GitHub release itself, with generated notes and
# the installer attached. Linux users install from the AUR (packaging/aur).
#
# bincue-studio vendors the sibling ../hostkit checkout, so both repos are
# checked out side by side and hostkit is linked statically.
name: CI

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: write

defaults:
  run:
    working-directory: bincue-studio

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: bincue-studio
    - uses: actions/checkout@v4
      with:
        repository: TheGameratorT/hostkit
        path: hostkit
    - name: Check tag matches CMake version
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cmake_version=$(sed -nE 's/^project\(bincue-studio VERSION ([0-9.]+).*$/\1/p' CMakeLists.txt)
        tag_version=${GITHUB_REF_NAME#v}
        if [ "$cmake_version" != "$tag_version" ]; then
          echo "::error::Tag $GITHUB_REF_NAME does not match CMakeLists.txt version $cmake_version"
          exit 1
        fi
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.*'
        cache: true
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build libgl1-mesa-dev libxkbcommon0 libfontconfig1
    - name: Build
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build
    - name: Smoke-test headless label render
      run: |
        ./build/bin/cdlabel --render smoke.png --size 300
        test -s smoke.png

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
        working-directory: bincue-studio
    steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-qt6-base
          mingw-w64-x86_64-qt6-svg
          mingw-w64-x86_64-qt6-tools
          mingw-w64-x86_64-taglib
          mingw-w64-x86_64-qt-installer-framework
    - uses: actions/checkout@v4
      with:
        path: bincue-studio
    - uses: actions/checkout@v4
      with:
        repository: TheGameratorT/hostkit
        path: hostkit
    - name: Check tag matches CMake version
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cmake_version=$(sed -nE 's/^project\(bincue-studio VERSION ([0-9.]+).*$/\1/p' CMakeLists.txt)
        tag_version=${GITHUB_REF_NAME#v}
        if [ "$cmake_version" != "$tag_version" ]; then
          echo "::error::Tag $GITHUB_REF_NAME does not match CMakeLists.txt version $cmake_version"
          exit 1
        fi
    - name: Build
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build
    - name: Build installer
      run: cmake --build build --target installer
    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: bincue-studio/build/BinCueStudio-*-Setup.exe
    - name: Create release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: bincue-studio/build/BinCueStudio-*-Setup.exe
        generate_release_notes: true
