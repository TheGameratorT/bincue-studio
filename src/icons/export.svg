<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Export BIN+CUE: the disc written out to files -->
  <defs>
    <linearGradient id="disc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a7c7e7"/>
      <stop offset="0.5" stop-color="#e3eef8"/>
      <stop offset="1" stop-color="#7fa6c9"/>
    </linearGradient>
  </defs>
  <circle cx="56" cy="52" r="46" fill="url(#disc)" stroke="#33506b" stroke-width="4"/>
  <circle cx="56" cy="52" r="16" fill="#eef4fa" stroke="#33506b" stroke-width="3"/>
  <circle cx="56" cy="52" r="6" fill="#33506b"/>
  <!-- the exported file, folded corner -->
  <path d="M80 72h24l16 16v34H80Z" fill="#fdf8ee" stroke="#33506b"
